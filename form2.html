<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <style>
      *{
        font-family: Kantumruy Pro;
      }
    
      body {
        font-family: sans-serif;
        background-color: lightgray;
        padding: 20px;
        display: flex;
        justify-content: center;
      }

      form {
        width: 500px;
        background-color: white;
        padding: 20px;
        border: 1px solid black;
      }

      fieldset {
        margin-bottom: 15px;
        border: 1px solid rgb(18, 0, 154); 
      }

      legend {
        color: rgb(0, 9, 128);
        font-weight: bold;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="date"],
      select {
        width: 95%;
        padding: 5px;
        margin-top: 5px;
        margin-bottom: 10px;
      }

      input[type="submit"] {
        background-color: rgb(0, 116, 68);
        color: white;
        padding: 8px;
        border: none;
      }

      input[type="reset"] {
        background-color: red;
        color: white;
        padding: 8px;
        border: none;
      }
    </style>
</head>
<body>
    <form action="#" method="post">
      <fieldset>
        <legend>១. ព័ត៌មានផ្ទាល់ខ្លួន</legend>

        <p>
          <label>ឈ្មោះពេញ:</label><br />
          <input
            type="text"
            name="student_name"
            placeholder="បញ្ចូលឈ្មោះ"
            required
          />
        </p>

        <p>
          <label>ថ្ងៃខែឆ្នាំកំណើត:</label><br />
          <input type="date" name="birth_date" required />
        </p>

        <p>
          <label>ភេទ:</label><br />
          <input type="radio" id="male" name="gender" value="ប្រុស" checked />
          <label for="male">ប្រុស</label>
          <input type="radio" id="female" name="gender" value="ស្រី" />
          <label for="female">ស្រី</label>
        </p>

        <p>
          <label>ខេត្ត/រាជធានីកំណើត:</label><br />
          <select name="pob" required>
            <option value="" disabled selected>
              --- ជ្រើសរើសខេត្ត/រាជធានី ---
            </option>
            <option value="ភ្នំពេញ">ភ្នំពេញ</option>
            <option value="បន្ទាយមានជ័យ">បន្ទាយមានជ័យ</option>
            <option value="បាត់ដំបង">បាត់ដំបង</option>
            <option value="កំពង់ចាម">កំពង់ចាម</option>
            <option value="កំពង់ឆ្នាំង">កំពង់ឆ្នាំង</option>
            <option value="កំពង់ស្ពឺ">កំពង់ស្ពឺ</option>
            <option value="កំពង់ធំ">កំពង់ធំ</option>
            <option value="កំពត">កំពត</option>
            <option value="កណ្តាល">កណ្តាល</option>
            <option value="កោះកុង">កោះកុង</option>
            <option value="ក្រចេះ">ក្រចេះ</option>
            <option value="មណ្ឌលគិរី">មណ្ឌលគិរី</option>
            <option value="ឧត្តរមានជ័យ">ឧត្តរមានជ័យ</option>
            <option value="ប៉ៃលិន">ប៉ៃលិន</option>
            <option value="ព្រះសីហនុ">ព្រះសីហនុ</option>
            <option value="ព្រះវិហារ">ព្រះវិហារ</option>
            <option value="ពោធិ៍សាត់">ពោធិ៍សាត់</option>
            <option value="ព្រៃវែង">ព្រៃវែង</option>
            <option value="រតនគិរី">រតនគិរី</option>
            <option value="សៀមរាប">សៀមរាប</option>
            <option value="ស្ទឹងត្រែង">ស្ទឹងត្រែង</option>
            <option value="ស្វាយរៀង">ស្វាយរៀង</option>
            <option value="តាកែវ">តាកែវ</option>
            <option value="ត្បូងឃ្មុំ">ត្បូងឃ្មុំ</option>
            <option value="កែប">កែប</option>
          </select>
        </p>
      </fieldset>

      <fieldset>
        <legend>២. ព័ត៌មានការសិក្សា</legend>

        <p>
          <label>ឆ្នាំសិក្សា:</label><br />
          <select name="academic_year">
            <option value="ឆ្នាំទី១">ឆ្នាំទី ១</option>
            <option value="ឆ្នាំទី២">ឆ្នាំទី ២</option>
            <option value="ឆ្នាំទី៣">ឆ្នាំទី ៣</option>
            <option value="ឆ្នាំទី៤">ឆ្នាំទី ៤</option>
          </select>
        </p>

        <p>
          <label>ជំនាញដែលចូលចិត្ត:</label><br />
          <input type="checkbox" id="web" name="skills" value="Web Dev" />
          <label for="web">Web Dev</label><br />
          <input type="checkbox" id="design" name="skills" value="Design" />
          <label for="design">UI/UX Design</label><br />
          <input type="checkbox" id="network" name="skills" value="Network" />
          <label for="network">Networking</label>
        </p>
      </fieldset>

      <fieldset>
        <legend>៣. គណនីសុវត្ថិភាព</legend>

        <p>
          <label>អ៊ីមែល:</label><br />
          <input
            type="email"
            name="student_email"
            placeholder="example@email.com"
            required
          />
        </p>

        <p>
          <label>លេខកូដសម្ងាត់:</label><br />
          <input
            type="password"
            name="student_password"
            placeholder="បញ្ចូលលេខកូដ"
            required
            minlength="3"
            maxlength="12"
          />
        </p>
      </fieldset>

      <p style="text-align: center">
        <input type="submit" value="រក្សាទុក (Submit)" />
        <input type="reset" value="សម្អាត (Clear)" />
      </p>
    </form>
</body>
</html>
